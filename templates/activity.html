{% extends "base.html" %}
{% block content %}
<h3 class="mb-4"><i class="bi bi-journal-text"></i> System Logs</h3>
<div class="card shadow-sm">
    <div class="card-body p-0">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
                <tr>
                    <th>Timestamp</th>
                    <th>Action</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td class="text-muted" style="width: 200px;">{{ log.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td>{{ log.action }}</td>
                    <td><span class="badge bg-secondary">Logged</span></td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center p-4">No activity recorded.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
