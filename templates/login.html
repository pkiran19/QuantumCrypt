{% extends "base.html" %}
{% block content %}
<div class="d-flex align-items-center justify-content-center py-5">
    <div class="glass-card overflow-hidden w-100 shadow-lg" style="max-width: 420px;">
        <div class="p-4 text-center text-white" style="background: #198754;">
            <h3 class="fw-bold mb-1"><i class="bi bi-shield-lock me-2"></i>Secure Login</h3>
            <p class="mb-0 opacity-75 small">Access your quantum-encrypted vault.</p>
        </div>
        
        <div class="p-4 p-md-5">
            <form method="post">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-muted">USERNAME</label>
                    <input class="form-control form-control-lg" type="text" name="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted">PASSWORD</label>
                    <input class="form-control form-control-lg" type="password" name="password" required>
                </div>
                
                <button class="btn btn-success btn-lg w-100 fw-bold mb-3" type="submit" style="background: #198754; border: none;">
                    Login to Dashboard
                </button>
            </form>
            <div class="text-center pt-3 border-top border-secondary border-opacity-10">
                <span class="text-muted small">New user?</span> 
                <a href="/register" class="text-success fw-bold text-decoration-none">Create Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
